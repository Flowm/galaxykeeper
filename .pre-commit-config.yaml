default_install_hook_types: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: lint-fix
        name: lint:fix
        entry: pnpm lint:fix
        language: system
        types_or: [ts, javascript, vue, json, css]
        pass_filenames: false
      - id: type-check
        name: type-check
        entry: pnpm type-check
        language: system
        types_or: [ts, vue]
        pass_filenames: false
      - id: test
        name: test
        entry: pnpm test
        language: system
        types_or: [ts, vue]
        pass_filenames: false
